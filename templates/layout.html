<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
  <script src="{{ url_for('static', filename='script.js') }}"></script>
  <title>{% block title %}NoWasteAm{% endblock %}</title>
  {% block extra_head %}{% endblock %}

  <style>
    /* ── SPLASH SCREEN ── */
    #nwa-splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #4caf50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    #nwa-splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* Ripple circle behind logo */
    .splash-logo-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 140px;
      height: 140px;
    }

    .splash-ripple {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      animation: ripple 2s ease-out infinite;
    }
    .splash-ripple:nth-child(2) { animation-delay: 0.6s; }
    .splash-ripple:nth-child(3) { animation-delay: 1.2s; }

    @keyframes ripple {
      0%   { transform: scale(0.7); opacity: 0.6; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    /* Logo circle */
    .splash-logo-circle {
      position: relative;
      z-index: 1;
      width: 100px;
      height: 100px;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: logoPop 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
      opacity: 0;
    }

    @keyframes logoPop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .splash-logo-circle img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      filter: brightness(0) invert(1); /* makes logo white */
    }

    /* Text */
    .splash-text {
      text-align: center;
      animation: fadeUp 0.7s 0.3s forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .splash-name {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 2.2rem;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 8px;
    }

    .splash-tagline {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.75);
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    /* Loading dots */
    .splash-dots {
      display: flex;
      gap: 7px;
      animation: fadeUp 0.7s 0.5s forwards;
      opacity: 0;
    }

    .splash-dots span {
      width: 7px;
      height: 7px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      animation: dot-bounce 1.2s ease-in-out infinite;
    }
    .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
    .splash-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-bounce {
      0%, 80%, 100% { transform: translateY(0);    opacity: 0.5; }
      40%            { transform: translateY(-8px); opacity: 1;   }
    }

    /* Prevent body scroll while splash is showing */
    body.splash-active {
      overflow: hidden;
    }
  </style>
</head>

<body class="splash-active">

  <!-- ── SPLASH SCREEN ── -->
  <div id="nwa-splash">
    <div class="splash-logo-wrap">
      <div class="splash-ripple"></div>
      <div class="splash-ripple"></div>
      <div class="splash-ripple"></div>
      <div class="splash-logo-circle">
        <img src="{{ url_for('static', filename='icon.jpg') }}" alt="NoWasteAm Logo" width="64" height="64">
      </div>
    </div>

    <div class="splash-text">
      <div class="splash-name">NoWasteAm</div>
      <div class="splash-tagline">Share Food. Share Care.</div>
    </div>

    <div class="splash-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- ── MAIN APP ── -->
  <div class="container mt-4">
    {% block content %}
    {% endblock %}

    <script>
      // Auto-hide flash messages after 5 seconds
      setTimeout(() => {
        const alerts = document.querySelectorAll('.flash-message');
        alerts.forEach(alert => alert.style.display = 'none');
      }, 5000);
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
      // Only init map if the #map element exists on this page
      if (document.getElementById('map')) {
        var map = L.map('map').setView([4.0303, 9.4604], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var marker;
        map.on('click', function(e) {
          var lat = e.latlng.lat;
          var lng = e.latlng.lng;

          if (document.getElementById("lat"))  document.getElementById("lat").value  = lat;
          if (document.getElementById("lng"))  document.getElementById("lng").value  = lng;

          if (marker) map.removeLayer(marker);
          marker = L.marker([lat, lng]).addTo(map);

          fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
            .then(res => res.json())
            .then(data => {
              let shortPlace = data.display_name.split(',').slice(0,2).map(p => p.trim()).join(',');
              if (document.getElementById("location_name")) {
                document.getElementById("location_name").value = shortPlace;
              }
              marker.bindPopup(shortPlace).openPopup();
            });
        });
      }
    </script>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // ── Splash screen logic ──
    const splash = document.getElementById('nwa-splash');

    function hideSplash() {
      splash.classList.add('hidden');
      document.body.classList.remove('splash-active');
    }

    // Hide splash when page is fully loaded
    // Minimum 1.8s so the animation plays nicely
    const minDelay = new Promise(resolve => setTimeout(resolve, 1800));
    const pageLoad = new Promise(resolve => {
      if (document.readyState === 'complete') {
        resolve();
      } else {
        window.addEventListener('load', resolve);
      }
    });

    Promise.all([minDelay, pageLoad]).then(hideSplash);

    // Safety fallback — always hide after 4 seconds max
    setTimeout(hideSplash, 4000);
  </script>

</body>
</html>
