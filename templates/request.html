 {% extends "layout.html" %}
    {% block content %}
    <h1 class="text-center mb-4">{{ food.Name }}</h1>

    <div class="card p-3">
        <p><strong>Quantity:</strong> {{ food.quantity }}</p>
        <p><strong>Location:</strong> {{ food.location }}</p>
        <p class="status-normal"><strong>Status:</strong> {{ food.status }}</p>

        {% if food.status != "reserved" %}
        <form method="POST" action="{{ url_for('confirm_request', id=id)}}">
            <button type="submit" class="btn btn-success">Confirm Request</button>
        </form>
        <form method="POST" action="{{ url_for('home', )}}">
            <button type="submit" class="btn btn-success">Cancel</button>
        {% else %}
        <p class="status">Already Reserved</p>
        {% endif %}
    {% endblock %}
    </div>

    <button>
      <a href="{{ url_for('home') }}" class="btn btn-secondary mt-3">Back to Homepage</a>
    </button>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
